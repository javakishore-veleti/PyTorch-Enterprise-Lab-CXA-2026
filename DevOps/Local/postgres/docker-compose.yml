services:
  postgres:
    image: postgres:16-alpine
    container_name: quantedge-postgres
    environment:
      POSTGRES_USER: quantedge
      POSTGRES_PASSWORD: quantedge_dev
      POSTGRES_DB: quantedge
    ports:
      - "5432:5432"
    volumes:
      - quantedge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantedge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  quantedge_postgres_data:
