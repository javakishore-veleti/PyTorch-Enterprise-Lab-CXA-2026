foundations:
  cfpb_complaints:
    download:
      hf_dataset_id: "cfpb/consumer-finance-complaints"
      destination_dir: "data/cfpb/raw"
      split: "train"
    ingest:
      parquet_dir: "data/cfpb/raw"
      output_parquet_dir: "data/cfpb/processed"
      narrative_col: "Consumer complaint narrative"
      product_col: "Product"
      min_narrative_len: 50
    preprocess:
      model_name: "distilbert-base-uncased"
      max_length: 256
      batch_size: 1000
    dataloader:
      batch_size: 32
      num_workers: 4
      pin_memory: true
      val_split: 0.1
    training:
      model_name: "distilbert-base-uncased"
      epochs: 3
      learning_rate: 2.0e-5
      seed: 42
      checkpoint_dir: "data/checkpoints/cfpb"
      resume_from: null

  device:
    prefer_gpu: true
  reproducibility:
    seed: 42
